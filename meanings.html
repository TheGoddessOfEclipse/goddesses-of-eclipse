<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Meanings | The Goddesses of Eclipse</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black min-h-screen text-slate-200 overflow-hidden relative font-body selection:bg-amber-500/30">

    <canvas id="particle-canvas" class="fixed inset-0 z-0 pointer-events-none"></canvas>

    <nav class="absolute top-6 left-8 z-50">
        <a href="index.html" class="flex items-center gap-2 text-amber-500 hover:text-amber-300 transition-colors font-mythic text-sm tracking-widest uppercase">
            <i class="ph ph-arrow-left text-xl"></i> Return to Eclipse
        </a>
    </nav>

    <section class="relative w-full h-screen flex items-center justify-center">
        
        <div id="orbit-container" class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div id="orbit-ring" class="relative rounded-full border border-amber-500/20 shadow-[0_0_50px_rgba(251,191,36,0.05)] pointer-events-auto cursor-grab active:cursor-grabbing">
                </div>
        </div>

        <div id="center-stage" class="absolute z-10 flex flex-col md:flex-row items-center justify-center gap-6 md:gap-10 w-full max-w-6xl px-8 opacity-0 transition-opacity duration-1000 pointer-events-none">
            
            <button onclick="closeLore()" class="absolute -top-10 right-4 md:-top-16 md:-right-8 w-12 h-12 flex items-center justify-center rounded-full bg-slate-900 border border-amber-500/50 text-slate-400 hover:text-amber-300 hover:bg-black transition-all hover:scale-110 shadow-[0_0_20px_rgba(251,191,36,0.15)] pointer-events-auto z-[60]">
                <i class="ph ph-x text-2xl"></i>
            </button>

            <div class="hidden md:flex flex-col justify-center flex-1 text-right bg-black/50 backdrop-blur-md border-r-2 border-amber-500/40 p-6 rounded-l-2xl shadow-[-20px_0_40px_rgba(0,0,0,0.8)] translate-x-10 transition-transform duration-1000" id="panel-left">
                <h2 id="display-char" class="font-mythic text-3xl lg:text-4xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-white via-amber-200 to-amber-600 drop-shadow-[0_0_10px_rgba(251,191,36,0.5)] m-0 mb-1"></h2>
                <h3 id="display-title" class="font-mythic text-lg text-amber-300 tracking-[0.2em] mb-6 uppercase"></h3>

                <p class="font-mythic text-[10px] text-amber-500 tracking-[0.2em] uppercase mb-1">The Concept</p>
                <h4 id="display-duality" class="font-mythic text-xl text-white mb-5"></h4>
                <p class="font-mythic text-[10px] text-amber-500 tracking-[0.2em] uppercase mb-1">The Path</p>
                <p id="display-path" class="font-body text-base text-slate-300 italic"></p>
            </div>

            <div class="relative flex flex-col items-center flex-none w-[200px] md:w-[260px] transition-transform duration-1000 scale-95" id="center-card-wrapper">
                
                <img id="display-img" src="" class="w-full max-h-[70vh] object-contain rounded-xl shadow-[0_0_40px_rgba(251,191,36,0.3)] pointer-events-auto">
                
            </div>

            <div class="flex-1 flex flex-col justify-center text-left bg-black/50 backdrop-blur-md border-l-2 border-amber-500/40 p-6 rounded-r-2xl shadow-[20px_0_40px_rgba(0,0,0,0.8)] -translate-x-10 transition-transform duration-1000 pointer-events-auto" id="panel-right">
                
                <div class="md:hidden mb-4 border-b border-amber-500/30 pb-3">
                    <h2 id="mobile-display-char" class="font-mythic text-2xl font-black tracking-widest text-amber-300 mb-1"></h2>
                    <h3 id="mobile-display-title" class="font-mythic text-xs text-amber-500 tracking-[0.2em] uppercase"></h3>
                    
                    <div class="flex items-center justify-between mt-3">
                        <div>
                            <p class="font-mythic text-[10px] text-amber-500 tracking-[0.2em] uppercase mb-1">The Concept</p>
                            <p id="mobile-display-duality" class="font-mythic text-sm text-white m-0"></p>
                        </div>
                        <div class="text-right">
                            <p class="font-mythic text-[10px] text-amber-500 tracking-[0.2em] uppercase mb-1">The Path</p>
                            <p id="mobile-display-path" class="font-body text-sm italic m-0"></p>
                        </div>
                    </div>
                </div>

                <p class="font-mythic text-[10px] text-amber-500 tracking-[0.2em] uppercase mb-3">Background Mythos</p>
                <p id="display-story" class="font-body text-sm md:text-base text-slate-300 leading-relaxed italic"></p>
            </div>

        </div>
    </section>

    <script src="meanings.js"></script>
</body>
</html>
