<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card of the Day | The Goddesses of Eclipse</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-forest-deep min-h-screen text-slate-200 overflow-hidden relative font-body selection:bg-amber-500/30">

    <nav class="absolute top-6 left-8 z-50">
        <a href="index.html" class="flex items-center gap-2 text-amber-500 hover:text-amber-300 transition-colors font-mythic text-sm tracking-widest uppercase">
            <i class="ph ph-arrow-left text-xl"></i> Return to Eclipse
        </a>
    </nav>

    <div id="fog-container" class="absolute inset-0 pointer-events-none z-10 transition-opacity duration-[4000ms] opacity-0">
        <div class="fog-img fog-layer-1"></div>
        <div class="fog-img fog-layer-2"></div>
    </div>

    <canvas id="magic-lights-canvas" class="absolute inset-0 z-20 pointer-events-none opacity-0 transition-opacity duration-1000"></canvas>

    <div id="draw-container" class="absolute inset-0 flex flex-col items-center justify-center z-30 transition-opacity duration-1000">
        <h2 class="font-mythic text-3xl md:text-5xl text-emerald-100 mb-10 tracking-[0.2em] drop-shadow-[0_0_15px_rgba(16,185,129,0.3)]">Seek the Day's Guidance</h2>
        
        <button id="draw-btn" class="group relative px-10 py-4 border border-emerald-500/50 bg-black/40 backdrop-blur-md rounded-full overflow-hidden hover:border-emerald-400 transition-all shadow-[0_0_30px_rgba(16,185,129,0.15)] hover:shadow-[0_0_50px_rgba(16,185,129,0.4)]">
            <span class="relative font-mythic text-xl text-emerald-300 tracking-widest uppercase z-10">Draw A Card</span>
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-emerald-500/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000 z-0"></div>
        </button>
    </div>

    <div id="reveal-stage" class="absolute inset-0 z-30 flex flex-col md:flex-row items-center justify-center gap-10 w-full max-w-5xl mx-auto px-8 opacity-0 pointer-events-none transition-all duration-[2000ms] scale-95">
        
        <div class="relative flex-none w-[240px] md:w-[320px] rounded-xl overflow-hidden border-2 shadow-[0_0_50px_rgba(255,255,255,0.1)] transition-colors duration-1000" id="daily-card-border">
            <img id="daily-img" src="" class="w-full h-auto object-contain">
        </div>

        <div class="flex-1 text-left bg-black/50 backdrop-blur-lg border-l-2 p-8 rounded-r-2xl shadow-[20px_0_40px_rgba(0,0,0,0.8)] transition-colors duration-1000" id="daily-panel">
            <p class="font-mythic text-xs tracking-[0.2em] uppercase mb-1 theme-text">Card of the Day</p>
            <h2 id="daily-char" class="font-mythic text-4xl md:text-5xl font-black tracking-widest m-0 mb-1 text-transparent bg-clip-text"></h2>
            <h3 id="daily-title" class="font-mythic text-lg tracking-[0.2em] mb-6 uppercase theme-text"></h3>
            
            <div class="grid grid-cols-2 gap-4 mb-6 pb-6 border-b border-white/10">
                <div>
                    <p class="font-mythic text-[10px] tracking-[0.2em] uppercase mb-1 theme-text">Focus Concept</p>
                    <p id="daily-duality" class="font-mythic text-xl text-white"></p>
                </div>
                <div>
                    <p class="font-mythic text-[10px] tracking-[0.2em] uppercase mb-1 theme-text">The Path</p>
                    <p id="daily-path" class="font-body text-base italic theme-text"></p>
                </div>
            </div>

            <p class="font-mythic text-[10px] tracking-[0.2em] uppercase mb-3 theme-text">Divine Guidance</p>
            <p id="daily-story" class="font-body text-base md:text-lg text-slate-200 leading-relaxed italic"></p>
        </div>
    </div>

    <script src="daily.js"></script>
</body>
</html>
