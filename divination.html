<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Divination | The Goddesses of Eclipse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black min-h-screen text-slate-200 overflow-hidden relative font-body selection:bg-amber-500/30">

    <div id="scattered-cards-bg" class="fixed inset-0 z-0 pointer-events-none opacity-40 filter blur-[1px]"></div>
    <canvas id="particle-canvas" class="fixed inset-0 z-[1] pointer-events-none"></canvas>

    <nav class="absolute top-6 left-8 z-50">
        <a href="index.html" class="flex items-center gap-2 text-amber-500 hover:text-amber-300 transition-colors font-mythic text-sm tracking-widest uppercase bg-black/40 px-3 py-2 rounded-lg backdrop-blur-sm border border-amber-500/20">
            <i class="ph ph-arrow-left text-xl"></i> Return to Eclipse
        </a>
    </nav>

    <div id="transition-flash" class="fixed inset-0 z-[100] pointer-events-none opacity-0 transition-opacity duration-[800ms]"></div>

    <div id="phase-altar" class="absolute inset-0 z-30 flex flex-col items-center justify-center transition-all duration-1000 bg-black/60 backdrop-blur-sm">
        <h2 class="font-mythic text-3xl md:text-5xl text-amber-100 mb-4 tracking-[0.2em] drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">Approach the Altar</h2>
        <p class="font-body text-slate-400 italic mb-12">Select the path of your inquiry.</p>
        
        <div class="flex flex-col md:flex-row gap-8 md:gap-16">
            <button onclick="startRitual('point', event)" class="spread-btn group flex flex-col items-center">
                <div class="w-24 h-24 rounded-full border border-purple-500/30 flex items-center justify-center bg-purple-950/20 group-hover:bg-purple-900/40 group-hover:border-purple-400 transition-all duration-500 group-hover:shadow-[0_0_30px_rgba(168,85,247,0.4)] relative overflow-hidden">
                    <i class="ph-fill ph-sparkle text-3xl text-purple-400 group-hover:scale-125 transition-transform duration-500 relative z-10"></i>
                    <div class="absolute inset-0 magic-circle-inner opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                </div>
                <h3 class="font-mythic text-purple-200 tracking-widest mt-4 group-hover:text-purple-100">The Point</h3>
            </button>

            <button onclick="startRitual('line', event)" class="spread-btn group flex flex-col items-center">
                <div class="w-24 h-24 rounded-full border border-teal-500/30 flex items-center justify-center bg-teal-950/20 group-hover:bg-teal-900/40 group-hover:border-teal-400 transition-all duration-500 group-hover:shadow-[0_0_30px_rgba(45,212,191,0.4)] relative overflow-hidden">
                    <i class="ph-fill ph-waves text-3xl text-teal-400 group-hover:scale-125 transition-transform duration-500 relative z-10"></i>
                    <div class="absolute inset-0 magic-circle-inner opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                </div>
                <h3 class="font-mythic text-teal-200 tracking-widest mt-4 group-hover:text-teal-100">The Line</h3>
            </button>

            <button onclick="startRitual('cross', event)" class="spread-btn group flex flex-col items-center">
                <div class="w-24 h-24 rounded-full border border-amber-500/30 flex items-center justify-center bg-amber-950/20 group-hover:bg-amber-900/40 group-hover:border-amber-400 transition-all duration-500 group-hover:shadow-[0_0_30px_rgba(251,191,36,0.4)] relative overflow-hidden">
                    <i class="ph-fill ph-crosshair text-3xl text-amber-400 group-hover:scale-125 transition-transform duration-500 relative z-10"></i>
                    <div class="absolute inset-0 magic-circle-outer opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                </div>
                <h3 class="font-mythic text-amber-200 tracking-widest mt-4 group-hover:text-amber-100">The Cross</h3>
            </button>
        </div>
    </div>

    <div id="phase-table" class="absolute inset-0 z-20 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-1000">
        <div id="vortex-container" class="relative w-full max-w-2xl h-[60vh] flex items-center justify-center cursor-pointer touch-none">
            <div id="shuffle-instructions" class="absolute text-center z-10 pointer-events-none transition-opacity duration-500">
                <h3 class="font-mythic text-2xl text-amber-400 tracking-[0.2em] mb-2 drop-shadow-md">Hold to Shuffle</h3>
                <p class="font-body text-slate-300 italic text-sm">Meditate on your question. Release when intuition commands.</p>
                <div class="w-48 h-1 bg-white/10 mx-auto mt-4 rounded-full overflow-hidden">
                    <div id="shuffle-progress" class="h-full bg-amber-500 w-0 transition-all duration-75"></div>
                </div>
            </div>
            <div id="vortex-engine" class="absolute w-10 h-10 transform-gpu preserve-3d"></div>
            <div id="deal-engine" class="absolute inset-0 flex items-center justify-center transform-gpu preserve-3d pointer-events-none"></div>
        </div>
    </div>

    <div id="reading-panel" class="absolute right-0 top-0 bottom-0 w-full md:w-[450px] bg-[#030303]/95 backdrop-blur-2xl border-l border-white/10 shadow-[-30px_0_50px_rgba(0,0,0,0.9)] z-50 transform translate-x-full transition-transform duration-700 overflow-y-auto hidden">
        
        <div class="p-8 relative flex flex-col items-center">
            
            <button onclick="closeReading()" class="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors z-10 bg-white/5 p-2 rounded-full border border-white/5 hover:border-white/20">
                <i class="ph ph-x text-xl"></i>
            </button>

            <div class="mt-8 mb-6 w-full flex justify-center">
                <div id="panel-card-container" class="relative rounded-md transition-all duration-700" style="width: 200px; height: 342px; border: 1px solid rgba(255,255,255,0.2);">
                    <img id="panel-card-img" src="" class="w-full h-full object-cover rounded-md transition-transform duration-700" />
                </div>
            </div>
            
            <div class="text-center w-full mb-8">
                <h2 id="read-char" class="font-mythic text-4xl md:text-5xl font-black tracking-widest text-transparent bg-clip-text pb-2"></h2>
                <h3 id="read-orientation" class="font-mythic text-sm tracking-[0.3em] uppercase drop-shadow-md"></h3>
            </div>

            <div class="w-full grid grid-cols-2 gap-6 mb-8 border-t border-white/10 pt-8">
                <div class="text-center">
                    <p class="text-[9px] text-slate-500 uppercase tracking-[0.2em] font-mythic mb-2">Macroscopic System<br><span class="text-[7px] text-slate-600 tracking-wider">Abstract Concept</span></p>
                    <p id="read-macro" class="font-mythic text-xl text-white drop-shadow-md"></p>
                </div>
                <div class="text-center border-l border-white/5">
                    <p class="text-[9px] text-slate-500 uppercase tracking-[0.2em] font-mythic mb-2">Microscopic System<br><span class="text-[7px] text-slate-600 tracking-wider">Mortal Path</span></p>
                    <p id="read-micro" class="font-mythic text-xl text-white drop-shadow-md"></p>
                </div>
            </div>

            <div class="w-full flex-1 mb-12">
                <p class="text-[10px] text-white/40 uppercase tracking-widest font-mythic mb-4 text-center">Divine Interpretation</p>
                <div id="read-guidance" class="font-body text-base text-slate-300 leading-loose bg-white/[0.02] p-6 rounded-xl border border-white/5 shadow-inner"></div>
            </div>
        </div>
    </div>

    <script src="divination.js"></script>
</body>
</html>
